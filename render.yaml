services:
  - type: web
    name: gas-tracker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "import api; api.migrate()" && gunicorn api:app
    envVars:
      - key: DB_PATH
        value: /data/gas_tracker.db
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
